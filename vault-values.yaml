global:
  enabled: true
  tlsDisable: true

injector:
  enabled: false

server:
  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        address = "[::]:8200"
        cluster_address = "[::]:8201"
        tls_disable = 1
      }

      storage "file" {
        path = "/vault/data"
      }

  ha:
    enabled: false

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: local-path

ui:
  enabled: true

